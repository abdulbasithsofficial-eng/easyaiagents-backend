<!-- Isko Head mein dalein -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// 1. Initialize Google Sign-In
window.onload = function () {
    google.accounts.id.initialize({
        client_id: "597827432772-l6hdnkkpcs58sa032cq3elb2ucprd6bi.apps.googleusercontent.com",
        callback: handleGoogleResponse
    });
}

async function handleGoogleResponse(response) {
    const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'google', credential: response.credential })
    });
    const data = await res.json();
    if(data.success) loginUser(data);
}

// 2. Email OTP via Resend
async function handleLoginOtp() {
    const email = document.getElementById('li_email').value;
    if(!email) return alert("Enter email");
    
    const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send-otp', email: email })
    });
    const data = await res.json();
    if(data.success) {
        document.getElementById('panelLoginOtp').style.display = 'block';
        alert("OTP sent via Resend!");
    }
}

function loginUser(data) {
    localStorage.setItem('eaa_token', data.token);
    localStorage.setItem('eaa_user', JSON.stringify(data.user));
    window.location.href = '/app.html'; // Direct builder page pe
}
</script>
